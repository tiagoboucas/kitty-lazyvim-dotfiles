# vim:fileencoding=utf-8:foldmethod=marker
# ─────────────────────────────────────────────────────────────────────────────
# kitty.conf — clean and commented. Colors: Tokyo Night (current-theme.conf).
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Reload: cmd+shift+r
# ─────────────────────────────────────────────────────────────────────────────

# ── Font ─────────────────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
# Keep ligatures, but disable them under the cursor (easier editing)
disable_ligatures cursor

# ── Colors ───────────────────────────────────────────────────────────────────
# Tokyo Night — includes terminal AND tab colors. Don't touch.
include current-theme.conf
# Default text in the theme's blue instead of near-white (overrides theme fg)
foreground #7aa2f7
# Apps that print "white" (ANSI color 7/15) also get theme blues
color7  #7aa2f7
color15 #8db0ff
# Cursor in the same blue
cursor #7aa2f7

# ── Accents / keyboard (US layout + Option) ──────────────────────────────────
# `no` gives the Option key back to macOS: Option+e → ´, Option+n → ~, Option+c → ç
macos_option_as_alt no
# UTF-8 locale (accents work) with English UI for terminal apps
env LANG=en_US.UTF-8

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
# Animated cursor trail on big jumps — easy to follow, and pretty
cursor_trail 3
cursor_trail_decay 0.1 0.3
# Theme accent blue instead of the default white trail
cursor_trail_color #7aa2f7

# ── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines 20000
scrollback_pager_history_size 100

# ── Mouse / URLs ─────────────────────────────────────────────────────────────
copy_on_select clipboard
strip_trailing_spaces smart
mouse_hide_wait 1.0
focus_follows_mouse yes
detect_urls yes
url_style curly
show_hyperlink_targets yes

# ── Bell / notifications ─────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.15
window_alert_on_bell yes
bell_on_tab "🔔 "
# Long command finishes in an unfocused tab → system notification
notify_on_cmd_finish unfocused 5.0 notify

# ── Windows / layout ─────────────────────────────────────────────────────────
remember_window_size yes
enabled_layouts splits,stack
window_margin_width 6
single_window_margin_width 0
window_border_width 1pt
inactive_text_alpha 0.85
placement_strategy center
confirm_os_window_close -1
# macOS titlebar in the theme color (integrated look)
macos_titlebar_color background
macos_quit_when_last_window_closed yes

# ── Tab bar ──────────────────────────────────────────────────────────────────
# Custom powerline-style bar (tab_bar.py): each tab gets a clickable ✕,
# and dragging a tab ALWAYS reorders — never detaches into a new window.
# Middle-click on a tab also closes it.
tab_bar_edge top
tab_bar_style custom
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_max_length 25
tab_title_template "{index} {title}"
tab_switch_strategy previous

# ── Performance ──────────────────────────────────────────────────────────────
repaint_delay 8
input_delay 2
sync_to_monitor yes

# ── Shell / integration ──────────────────────────────────────────────────────
shell_integration enabled
# Lets scripts (e.g. claude-notify.sh) talk to kitty
allow_remote_control yes
paste_actions quote-urls-at-prompt,confirm

# ─────────────────────────────────────────────────────────────────────────────
# Keymaps  (see also ~/dotfiles/KEYMAPS.md)
# ─────────────────────────────────────────────────────────────────────────────

# ── Tabs ─────────────────────────────────────────────────────────────────────
map cmd+t       launch --type=tab --cwd=current
map cmd+w       close_tab
map cmd+]       next_tab
map cmd+[       previous_tab
map ctrl+tab    next_tab
map ctrl+shift+tab previous_tab
map cmd+shift+] move_tab_forward
map cmd+shift+[ move_tab_backward
map cmd+alt+t   set_tab_title
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# ── Splits ("splits" layout) ─────────────────────────────────────────────────
map cmd+d        launch --location=vsplit --cwd=current
map cmd+shift+d  launch --location=hsplit --cwd=current
map cmd+alt+left  neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up    neighboring_window up
map cmd+alt+down  neighboring_window down
map cmd+shift+z  toggle_layout stack
map cmd+r        start_resizing_window

# ── Scrollback / utilities ───────────────────────────────────────────────────
map cmd+f       show_scrollback
map cmd+k       clear_terminal to_cursor active
map cmd+shift+e open_url_with_hints
map cmd+shift+p kitten hints --type path --program -
map cmd+,       edit_config_file
map cmd+shift+r load_config_file
